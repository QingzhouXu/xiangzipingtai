<!DOCTYPE html>
<html lang="zh-CN" style="font-family: 'SimHei', '黑体', 'PingFang SC', 'Microsoft YaHei', sans-serif !important;">
<head>
<script>(function(){var t=localStorage.getItem("theme");if(t==="dark"){document.documentElement.classList.add("dark");}else if(t==="light"){document.documentElement.classList.remove("dark");}else if(window.matchMedia&&window.matchMedia("(prefers-color-scheme:dark)").matches){document.documentElement.classList.add("dark");}if(document.referrer&&document.referrer.indexOf(window.location.origin)===0){document.documentElement.classList.add("page-entering");}})();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平台首页</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <style>
        /* ── Background glow blobs ── */
        .client-page {
            position: relative;
            overflow-x: hidden;
            overflow-y: auto;
            background: #f7f4f0;
        }
        .dark .client-page {
            background: var(--background);
        }
        .dark .home-glow-top {
            opacity: 0.08;
        }
        .dark .home-glow-bottom {
            opacity: 0.06;
        }
        .home-glow-top {
            position: fixed;
            top: -20vh;
            left: 50%;
            transform: translateX(-50%);
            width: 100vh;
            height: 50vh;
            border-radius: 50%;
            background: var(--primary);
            opacity: 0.18;
            filter: blur(100px);
            pointer-events: none;
            z-index: 0;
            animation: home-float-top 10s ease-in-out infinite;
        }
        .home-glow-bottom {
            position: fixed;
            bottom: -20vh;
            right: 10%;
            width: 80vh;
            height: 60vh;
            border-radius: 50%;
            background: var(--chart-2);
            opacity: 0.15;
            filter: blur(90px);
            pointer-events: none;
            z-index: 0;
            animation: home-float-bottom 8s ease-in-out 2s infinite;
        }

        @keyframes home-float-top {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            33% { transform: translateX(-45%) translateY(-15px); }
            66% { transform: translateX(-55%) translateY(10px); }
        }
        @keyframes home-float-bottom {
            0%, 100% { transform: translateY(0); }
            33% { transform: translateX(10px) translateY(-10px); }
            66% { transform: translateX(-8px) translateY(8px); }
        }
    </style>
</head>
<body class="client-page">
    <!-- 背景光晕 -->
    <div class="home-glow-top"></div>
    <div class="home-glow-bottom"></div>
    {% include "partials/client_nav.html" %}
    <main class="client-main-with-sidebar">
        <!-- 侧边栏 -->
        <aside class="category-sidebar">
            <div class="sidebar-tilt-inner">
            <div class="sidebar-header-dark">
                <span class="header-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                </span>
                <h3>商铺分类</h3>
            </div>
            
            <!-- 搜索框 -->
            <div class="sidebar-search-dark">
                <div class="search-wrapper">
                    <span class="search-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="11" cy="11" r="8"/>
                            <path d="m21 21-4.3-4.3"/>
                        </svg>
                    </span>
                    <input type="text" id="search-input" placeholder="搜索店铺...">
                    <button type="button" id="search-btn" class="enter-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="9 10 4 15 9 20"/>
                            <path d="M20 4v7a4 4 0 0 1-4 4H4"/>
                        </svg>
                    </button>
                </div>
            </div>
            
            <nav class="category-nav-dark">
                <button class="category-item-dark active" data-category="all">
                    <span class="category-icon-dark">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="3" width="7" height="7" rx="2"/>
                            <rect x="14" y="3" width="7" height="7" rx="2"/>
                            <rect x="3" y="14" width="7" height="7" rx="2"/>
                            <rect x="14" y="14" width="7" height="7" rx="2"/>
                        </svg>
                    </span>
                    <span class="category-text-dark">全部</span>
                    <span class="category-count">{{ merchants|length }}</span>
                </button>
                {% for cat, count in categories.items() %}
                <button class="category-item-dark" data-category="{{ cat }}">
                    <span class="category-icon-dark">
                        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/>
                        </svg>
                    </span>
                    <span class="category-text-dark">{{ cat }}</span>
                    <span class="category-count">{{ count }}</span>
                </button>
                {% endfor %}
            </nav>
            </div>
        </aside>

        <!-- 主内容区 -->
        <div class="client-main">
            <section class="section-title">
                <h1>推荐商铺</h1>
                <p>精选附近优质门店，支持智能客服即时咨询</p>
            </section>
            <section class="shop-list" id="shop-grid">
                {% for item in merchants %}
                <article class="shop-card-horizontal">
                    <div class="shop-cover-horizontal">
                        <img src="{{ item.cover }}" alt="{{ item.name }}" class="shop-cover-img" onerror="this.src='/static/img/shops/coffee_shop.png'">
                    </div>
                    <div class="shop-card-body-horizontal">
                        <div class="shop-info">
                            <h3>{{ item.name }}</h3>
                            <div class="shop-meta">
                                <span class="category-tag">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                                    {{ item.category }}
                                </span>
                                <span class="rating">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
                                    {{ item.rating }}
                                </span>
                                <span class="hours">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                                    {{ item.hours }}
                                </span>
                            </div>
                            <p class="slogan">{{ item.slogan }}</p>
                            <p class="address">
                                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
                                {{ item.address }}
                            </p>
                        </div>
                        <div class="shop-actions-horizontal">
                            <a class="primary-action-horizontal" href="/chat?merchant={{ item.id }}">
                                <span class="action-icon">
                                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
                                </span>
                                <span>进店</span>
                            </a>
                            <div class="action-group">
                                <button class="favorite-btn" data-merchant-id="{{ item.id }}" data-merchant-name="{{ item.name }}">
                                    <span class="heart-icon">
                                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
                                    </span>
                                    <span>收藏</span>
                                </button>
                                <a class="outline-action-horizontal" href="/chat?merchant={{ item.id }}">
                                    <span class="action-icon">
                                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                                    </span>
                                    <span>AI咨询</span>
                                </a>
                            </div>
                        </div>
                    </div>
                </article>
                {% endfor %}
            </section>
        </div>
    </main>
<script src="/static/js/client_home.js"></script>
<script src="/static/js/page_transition.js"></script>
</body>
</html>
