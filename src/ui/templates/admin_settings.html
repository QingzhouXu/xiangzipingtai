<!DOCTYPE html>
<html lang="zh-CN" style="font-family: 'SimHei', '黑体', 'PingFang SC', 'Microsoft YaHei', sans-serif !important;">
<head>
<script>(function(){var t=localStorage.getItem("theme");if(t==="dark"){document.documentElement.classList.add("dark");}else if(t==="light"){document.documentElement.classList.remove("dark");}else if(window.matchMedia&&window.matchMedia("(prefers-color-scheme:dark)").matches){document.documentElement.classList.add("dark");}if(document.referrer&&document.referrer.indexOf(window.location.origin)===0){document.documentElement.classList.add("page-entering");}})();</script><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>账号设置</title><link rel="stylesheet" href="/static/css/style.css"></head>
<body class="merchant-page">
    {% include "partials/merchant_sidebar.html" %}
    <main class="merchant-main">
        <h1>账号设置</h1>
        <section class="settings-card">
            <h2>账号安全</h2>
            <div class="setting-row"><div><strong>登录密码</strong><small>上次修改：2024-01-01</small></div><button class="primary-action">修改登录密码</button></div>
            <div class="setting-row"><div><strong>绑定手机号</strong><small>当前绑定：138****8888</small></div><button class="outline-action">更换绑定手机号</button></div>
            <div class="form-actions"><button class="primary-action">保存设置</button><button class="danger-outline">注销商铺</button></div>
        </section>
    </main>
<script src="/static/js/admin_settings.js"></script>
    <script src="/static/js/page_transition.js"></script>
</body>
</html>
