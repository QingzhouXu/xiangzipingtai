<header class="client-nav">
    <div class="platform-brand">
        <a href="/" class="platform-logo"><img src="/static/img/shops/平台logo.jpg" alt="平台Logo"></a>
        <span class="platform-name">巷子平台</span>
    </div>
    <script>
        window.__currentUser = {{ (current_user.username or '') | tojson }};
    </script>
    <nav>
        <button id="theme-toggle" class="theme-toggle-btn" aria-label="切换主题">
            <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="4"/>
                <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
            </svg>
            <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
        </button>
        <a class="active" href="/">首页</a>
        <a href="/favorites">我的收藏</a>
        <a href="/profile">个人中心</a>
        <a href="/official-support">客服帮助</a>
        {% if current_user %}
        <div class="user-avatar-pill">
            <div class="avatar-pill-trigger">
                <div class="user-avatar-circle">
                    {% if current_user.avatar_data %}
                    <img src="{{ current_user.avatar_data }}" alt="{{ current_user.display_name }}" class="avatar-img">
                    {% else %}
                    <svg class="default-avatar-svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
                    </svg>
                    {% endif %}
                </div>
                <span class="avatar-pill-name">{{ current_user.display_name or current_user.username }}</span>
            </div>
            <div class="avatar-pill-dropdown">
                <a class="avatar-dropdown-item" href="/profile">个人中心</a>
                <a class="avatar-dropdown-item" href="/logout">退出登录</a>
            </div>
        </div>
        {% else %}
        <a class="login-pill" href="/login">
            <span class="btn-text">登录 / 注册</span>
            <span class="btn-arrow">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m9 18 6-6-6-6"/>
                </svg>
            </span>
        </a>
        {% endif %}
    </nav>
</header>
