<header class="client-nav">
    <div class="platform-brand">
        <a href="/" class="platform-logo"><img src="/static/img/shops/平台logo.png" alt="平台Logo"></a>
        <span class="platform-name">雷霆电商平台</span>
    </div>
    <nav>
        <button id="theme-toggle" class="theme-toggle-btn" aria-label="切换主题">
            <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="4"/>
                <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
            </svg>
            <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
        </button>
        <a class="active" href="/">首页</a>
        <a href="/favorites">我的收藏</a>
        <a href="/profile">个人中心</a>
        <a href="/official-support">客服帮助</a>
        {% if current_user %}
        <a class="login-pill" href="/logout">
            <span class="btn-text">退出登录</span>
            <span class="btn-arrow">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m9 18 6-6-6-6"/>
                </svg>
            </span>
        </a>
        {% else %}
        <a class="login-pill" href="/login">
            <span class="btn-text">登录 / 注册</span>
            <span class="btn-arrow">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round">
                    <path d="m9 18 6-6-6-6"/>
                </svg>
            </span>
        </a>
        {% endif %}
    </nav>
</header>
