<!DOCTYPE html>
<html lang="zh-CN" style="font-family: 'SimHei', '黑体', 'PingFang SC', 'Microsoft YaHei', sans-serif !important;">
<head>
<script>(function(){var t=localStorage.getItem("theme");if(t==="dark"){document.documentElement.classList.add("dark");}else if(t==="light"){document.documentElement.classList.remove("dark");}else if(window.matchMedia&&window.matchMedia("(prefers-color-scheme:dark)").matches){document.documentElement.classList.add("dark");}if(document.referrer&&document.referrer.indexOf(window.location.origin)===0){document.documentElement.classList.add("page-entering");}})();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的收藏</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="client-page">
    {% include "partials/client_nav.html" %}
    <main class="client-main">
        <section class="section-title">
            <h1>我的收藏</h1>
            <p>管理你收藏的优质店铺</p>
        </section>
        
        <section class="favorites-section">
            <div class="favorites-toolbar">
                <div class="favorites-stats">
                    <span>共收藏 <strong id="favorites-count">0</strong> 家店铺</span>
                </div>
                <div class="favorites-actions">
                    <button id="clear-all-favorites" class="danger-outline">清空收藏</button>
                </div>
            </div>
            
            <div class="favorites-grid" id="favorites-grid">
                <!-- 收藏的店铺将在这里动态加载 -->
                <div class="loading-placeholder">
                    <div style="text-align: center; padding: 40px; color: var(--muted-foreground);">
                        <div style="font-size: 48px; margin-bottom: 16px;">🤍</div>
                        <h3>还没有收藏的店铺</h3>
                        <p>去首页浏览并收藏你喜欢的店铺吧</p>
                        <a href="/" class="primary-action">去首页浏览</a>
                    </div>
                </div>
            </div>
        </section>
    </main>
    <script src="/static/js/favorites.js"></script>
    <script src="/static/js/page_transition.js"></script>
</body>
</html>
