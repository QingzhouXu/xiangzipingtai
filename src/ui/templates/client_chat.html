<!DOCTYPE html>
<html lang="zh-CN" style="font-family: 'SimHei', '黑体', 'PingFang SC', 'Microsoft YaHei', sans-serif !important;">
<head>
<script>(function(){var t=localStorage.getItem("theme");if(t==="dark"){document.documentElement.classList.add("dark");}else if(t==="light"){document.documentElement.classList.remove("dark");}else if(window.matchMedia&&window.matchMedia("(prefers-color-scheme:dark)").matches){document.documentElement.classList.add("dark");}if(document.referrer&&document.referrer.indexOf(window.location.origin)===0){document.documentElement.classList.add("page-entering");}})();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ merchant.name }}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/vendor/marked.min.js"></script>
</head>
<body class="client-page" data-merchant-id="{{ merchant.id }}">
    {% include "partials/client_nav.html" %}
    <main class="store-layout">
        <section class="store-detail-card">
            <div class="store-top-actions">
                <a href="/" class="soft-button">&lsaquo; 返回列表</a>
                <a href="/" class="soft-button">&lceil; 返回首页</a>
            </div>
            <img src="{{ merchant.cover }}" alt="{{ merchant.name }}" class="store-hero-img">
            <div class="store-info">
                <div>
                    <h1>{{ merchant.name }}</h1>
                    <p>营业时间：{{ merchant.hours }} ｜ 地址：{{ merchant.address }} ｜ 综合评分：{{ merchant.rating }}分</p>
                </div>
                <div class="store-buttons">
                    <button class="outline-action">&hearts; 收藏商铺</button>
                    <button class="soft-button">&lceil; 分享</button>
                </div>
            </div>
        </section>

        <aside class="chat-widget">
            <header class="chat-widget-header">
                <div class="store-bar">
                    <img src="{{ merchant.avatar }}" alt="{{ merchant.name }}" class="store-bar-avatar" onerror="this.style.display='none'">
                    <div class="store-bar-info">
                        <strong>{{ merchant.name }}</strong>
                        <span class="store-bar-status">
                            <span class="status-dot online" id="status-dot"></span>
                            <span id="board-status">AI 客服在线</span>
                        </span>
                    </div>
                </div>
                <div class="backend-switch-wrapper">
                    <button class="backend-switch-btn" id="backend-switch-btn" title="切换模型后端">
                        <span id="backend-badge">云端</span>
                        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"></polyline></svg>
                    </button>
                    <div class="backend-dropdown" id="backend-dropdown">
                        <button class="backend-option" data-backend="ollama">
                            <span>🖥️</span> 本地模型
                        </button>
                        <button class="backend-option" data-backend="dashscope">
                            <span>☁️</span> Qwen云端
                        </button>
                        <button class="backend-option" data-backend="mock">
                            <span>🧪</span> 演示模式
                        </button>
                    </div>
                </div>
            </header>

            <div class="chat-container" id="chat-container">
                <div class="chat-welcome">
                    <div class="welcome-avatar">🤖</div>
                    <h3>您好！欢迎来到{{ merchant.name }}</h3>
                    <p>我是您的 AI 客服助手，有什么可以帮助您的？</p>
                </div>
            </div>

            <div class="quick-replies" id="quick-replies">
                <button class="quick-reply-btn" data-message="营业时间是什么？">🕐 营业时间</button>
                <button class="quick-reply-btn" data-message="你们招牌是什么？">⭐ 招牌推荐</button>
                <button class="quick-reply-btn" data-message="有没有会员优惠？">💎 会员优惠</button>
                <button class="quick-reply-btn" data-message="可以外送吗？">🛵 配送服务</button>
            </div>

            <div class="chat-input-row">
                <input type="text" id="message-input" placeholder="输入您的问题..." autocomplete="off">
                <button id="send-button" class="send-btn-icon" title="发送">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="22" y1="2" x2="11" y2="13"></line>
                        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
                    </svg>
                </button>
            </div>
            <div class="chat-input-actions">
                <button id="reset-demo" class="soft-button">清空对话</button>
            </div>
        </aside>
    </main>
    <script src="/static/js/chat.js"></script>
    <script src="/static/js/page_transition.js"></script>
</body>
</html>
