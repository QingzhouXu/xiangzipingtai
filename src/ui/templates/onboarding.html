<!DOCTYPE html>
<html lang="zh-CN" style="font-family: 'SimHei', '黑体', 'PingFang SC', 'Microsoft YaHei', sans-serif !important;">
<head>
<script>(function(){var t=localStorage.getItem("theme");if(t==="dark"){document.documentElement.classList.add("dark");}else if(t==="light"){document.documentElement.classList.remove("dark");}else if(window.matchMedia&&window.matchMedia("(prefers-color-scheme:dark)").matches){document.documentElement.classList.add("dark");}if(document.referrer&&document.referrer.indexOf(window.location.origin)===0){document.documentElement.classList.add("page-entering");}})();</script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>商户入驻申请</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="client-page">
    {% include "partials/client_nav.html" %}
    <main class="apply-page">
        <h1>商户入驻申请</h1>
        <p>填写以下信息，完成入驻后即可创建您的专属店铺</p>
        <form method="post" class="apply-card" enctype="multipart/form-data">
            {% if error %}<div class="form-error">{{ error }}</div>{% endif %}
            
            <div class="avatar-upload-section">
                <div class="avatar-upload" id="avatar-upload">
                    <span id="avatar-preview">▣</span>
                    <strong>上传店铺头像</strong>
                    <small>支持 JPG、PNG 格式，建议 200×200px</small>
                </div>
                <input type="file" id="avatar-input" name="avatar" accept="image/jpeg,image/png" style="display: none;">
                <input type="hidden" id="avatar-data" name="avatar_data">
            </div>
            
            <div class="form-group">
                <label>营业执照 / 资质资料</label>
                <div class="file-upload" id="license-upload">
                    <span id="license-filename">⇧ 点击上传资料文件</span>
                </div>
                <input type="file" id="license-input" name="license_file" accept=".pdf,.jpg,.jpeg,.png" style="display: none;">
                <input type="hidden" id="license-data" name="license_data">
            </div>
            
            <div class="form-group">
                <label>登录账号</label>
                <input name="username" placeholder="请输入登录账号" required>
            </div>
            
            <div class="form-group">
                <label>登录密码</label>
                <input name="password" type="password" placeholder="请输入登录密码" required>
            </div>
            
            <div class="form-group">
                <label>店铺名称</label>
                <input name="merchant_name" placeholder="请输入店铺名称" required>
            </div>
            
            <div class="form-group">
                <label>经营范围</label>
                <select name="category" id="category-select" required>
                    <option value="">请选择经营范围</option>
                    <option value="餐饮">餐饮</option>
                    <option value="咖啡">咖啡</option>
                    <option value="茶饮">茶饮</option>
                    <option value="甜品">甜品</option>
                    <option value="生活服务">生活服务</option>
                    <option value="__other__">其他（自行填写）</option>
                </select>
                <input name="category_other" id="category-other" style="display: none; margin-top: 8px;" placeholder="请输入经营范围">
            </div>
            <script>
                document.getElementById('category-select').addEventListener('change', function() {
                    var otherInput = document.getElementById('category-other');
                    if (this.value === '__other__') {
                        otherInput.style.display = 'block';
                        otherInput.required = true;
                        otherInput.name = 'category';
                        this.name = '';
                    } else {
                        otherInput.style.display = 'none';
                        otherInput.required = false;
                        otherInput.name = '';
                        this.name = 'category';
                    }
                });
            </script>
            
            <div class="form-group">
                <label>联系方式</label>
                <input name="contact" placeholder="请输入联系方式" required>
            </div>
            
            <div class="apply-actions">
                <button type="button" class="soft-button">保存草稿</button>
                <button type="reset" class="soft-button">重置填写</button>
                <button type="submit" class="primary-action">提交入驻申请</button>
            </div>
        </form>
        
        <script src="/static/js/onboarding.js"></script>
    </main>
    <script src="/static/js/page_transition.js"></script>
</body>
</html>
